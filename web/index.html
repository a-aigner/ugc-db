<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI UGC Creator Database</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="root"></div>

    <!-- React + Babel -->
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
    <!-- d3-force + its peer deps (UMD bundles all attach to window.d3).
         IMPORTANT: dispatch/quadtree/timer MUST load before d3-force. -->
    <script src="https://unpkg.com/d3-dispatch@3.0.1/dist/d3-dispatch.min.js"></script>
    <script src="https://unpkg.com/d3-quadtree@3.0.1/dist/d3-quadtree.min.js"></script>
    <script src="https://unpkg.com/d3-timer@3.0.1/dist/d3-timer.min.js"></script>
    <script src="https://unpkg.com/d3-force@3.0.0/dist/d3-force.min.js"></script>

    <!-- data layer (plain JS) -->
    <script src="db.js"></script>
    <script src="rel-types.js"></script>

    <!-- app modules (JSX) -->
    <script type="text/babel" src="ui.jsx"></script>
    <script type="text/babel" src="form.jsx"></script>
    <script type="text/babel" src="detail.jsx"></script>
    <script type="text/babel" src="family-form.jsx"></script>
    <script type="text/babel" src="family-detail.jsx"></script>
    <script type="text/babel" src="families.jsx"></script>
    <script type="text/babel" src="relationship-form.jsx"></script>
    <script type="text/babel" src="relationship-detail.jsx"></script>
    <script type="text/babel" src="graph.jsx"></script>
    <script type="text/babel" src="arcs.jsx"></script>
    <script type="text/babel" src="arc-detail.jsx"></script>
    <script type="text/babel" src="arc-form.jsx"></script>
    <script type="text/babel" src="library.jsx"></script>
    <script type="text/babel" src="library-form.jsx"></script>
    <script type="text/babel" src="draft-review.jsx"></script>
    <script type="text/babel" src="app.jsx"></script>
  </body>
</html>
